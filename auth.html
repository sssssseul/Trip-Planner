<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trip Planner - 로그인</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9C%88%EF%B8%8F%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+KR:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EAF4FB;
    --paper-raised:#FFFFFF;
    --ink:#2C4A5E;
    --forest:#CDE9F8;
    --forest-deep:#3E8FC0;
    --coral:#2EA3C7;
    --coral-deep:#1D6A85;
    --pink:#E8749A;
    --pink-deep:#B84E72;
    --sand:#DCF0FB;
    --sand-line:#BEE3F5;
    --muted:#6C90A3;
  }
  *{box-sizing:border-box;}
  html, body{overflow-x:hidden; max-width:100%;}
  body{
    margin:0;
    min-height:100vh;
    background-color:var(--paper);
    background-image:url("data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20width%3D%27900%27%20height%3D%27620%27%3E%3Cdefs%3E%3CradialGradient%20id%3D%27g%27%20cx%3D%2735%25%27%20cy%3D%2730%25%27%20r%3D%2775%25%27%3E%3Cstop%20offset%3D%270%25%27%20stop-color%3D%27%23FFFFFF%27%20stop-opacity%3D%270.95%27/%3E%3Cstop%20offset%3D%27100%25%27%20stop-color%3D%27%23BFE0EF%27%20stop-opacity%3D%270.4%27/%3E%3C/radialGradient%3E%3Cfilter%20id%3D%27b%27%20x%3D%27-60%25%27%20y%3D%27-60%25%27%20width%3D%27220%25%27%20height%3D%27220%25%27%3E%3CfeGaussianBlur%20stdDeviation%3D%276%27/%3E%3C/filter%3E%3C/defs%3E%3Cg%20fill%3D%27%239DC3DE%27%20opacity%3D%270.4%27%20filter%3D%27url(%23b)%27%3E%3Cellipse%20cx%3D%2798%27%20cy%3D%27110%27%20rx%3D%2748%27%20ry%3D%2724%27/%3E%3Cellipse%20cx%3D%27143%27%20cy%3D%2796%27%20rx%3D%2736%27%20ry%3D%2720%27/%3E%3Cellipse%20cx%3D%2758%27%20cy%3D%27100%27%20rx%3D%2726%27%20ry%3D%2715%27/%3E%3Cellipse%20cx%3D%27796%27%20cy%3D%2763%27%20rx%3D%2730%27%20ry%3D%2715%27/%3E%3Cellipse%20cx%3D%27822%27%20cy%3D%2756%27%20rx%3D%2720%27%20ry%3D%2711%27/%3E%3Cellipse%20cx%3D%27196%27%20cy%3D%27438%27%20rx%3D%2760%27%20ry%3D%2730%27/%3E%3Cellipse%20cx%3D%27256%27%20cy%3D%27420%27%20rx%3D%2742%27%20ry%3D%2724%27/%3E%3Cellipse%20cx%3D%27146%27%20cy%3D%27428%27%20rx%3D%2730%27%20ry%3D%2717%27/%3E%3Cellipse%20cx%3D%27706%27%20cy%3D%27508%27%20rx%3D%2744%27%20ry%3D%2722%27/%3E%3Cellipse%20cx%3D%27746%27%20cy%3D%27494%27%20rx%3D%2730%27%20ry%3D%2716%27/%3E%3Cellipse%20cx%3D%27476%27%20cy%3D%27168%27%20rx%3D%2726%27%20ry%3D%2713%27/%3E%3Cellipse%20cx%3D%27501%27%20cy%3D%27160%27%20rx%3D%2716%27%20ry%3D%279%27/%3E%3Cellipse%20cx%3D%2751%27%20cy%3D%27588%27%20rx%3D%2720%27%20ry%3D%2710%27/%3E%3C/g%3E%3Cg%20fill%3D%27url(%23g)%27%3E%3Cellipse%20cx%3D%2790%27%20cy%3D%27100%27%20rx%3D%2748%27%20ry%3D%2724%27/%3E%3Cellipse%20cx%3D%27135%27%20cy%3D%2786%27%20rx%3D%2736%27%20ry%3D%2720%27/%3E%3Cellipse%20cx%3D%2755%27%20cy%3D%2792%27%20rx%3D%2726%27%20ry%3D%2715%27/%3E%3Crect%20x%3D%2740%27%20y%3D%2792%27%20width%3D%27120%27%20height%3D%2730%27%20rx%3D%2715%27/%3E%3Cellipse%20cx%3D%27790%27%20cy%3D%2755%27%20rx%3D%2730%27%20ry%3D%2715%27/%3E%3Cellipse%20cx%3D%27815%27%20cy%3D%2748%27%20rx%3D%2720%27%20ry%3D%2711%27/%3E%3Crect%20x%3D%27772%27%20y%3D%2748%27%20width%3D%2766%27%20height%3D%2718%27%20rx%3D%279%27/%3E%3Cellipse%20cx%3D%27190%27%20cy%3D%27430%27%20rx%3D%2760%27%20ry%3D%2730%27/%3E%3Cellipse%20cx%3D%27250%27%20cy%3D%27412%27%20rx%3D%2742%27%20ry%3D%2724%27/%3E%3Cellipse%20cx%3D%27140%27%20cy%3D%27420%27%20rx%3D%2730%27%20ry%3D%2717%27/%3E%3Crect%20x%3D%27120%27%20y%3D%27416%27%20width%3D%27170%27%20height%3D%2734%27%20rx%3D%2717%27/%3E%3Cellipse%20cx%3D%27700%27%20cy%3D%27500%27%20rx%3D%2744%27%20ry%3D%2722%27/%3E%3Cellipse%20cx%3D%27740%27%20cy%3D%27486%27%20rx%3D%2730%27%20ry%3D%2716%27/%3E%3Crect%20x%3D%27662%27%20y%3D%27486%27%20width%3D%27120%27%20height%3D%2726%27%20rx%3D%2713%27/%3E%3Cellipse%20cx%3D%27470%27%20cy%3D%27160%27%20rx%3D%2726%27%20ry%3D%2713%27/%3E%3Cellipse%20cx%3D%27495%27%20cy%3D%27152%27%20rx%3D%2716%27%20ry%3D%279%27/%3E%3Crect%20x%3D%27452%27%20y%3D%27150%27%20width%3D%2772%27%20height%3D%2716%27%20rx%3D%278%27/%3E%3Cellipse%20cx%3D%2745%27%20cy%3D%27580%27%20rx%3D%2720%27%20ry%3D%2710%27/%3E%3Crect%20x%3D%2730%27%20y%3D%27574%27%20width%3D%2740%27%20height%3D%2712%27%20rx%3D%276%27/%3E%3C/g%3E%3C/svg%3E");
    background-repeat:repeat;
    background-size:900px 620px;
    color:var(--ink);
    font-family:'Noto Sans KR', 'Noto Sans JP', -apple-system, sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .card{
    width:100%;
    max-width:400px;
    background:var(--paper-raised);
    border:1px solid var(--sand-line);
    border-radius:20px;
    padding:36px 32px;
    box-shadow:0 10px 30px rgba(62,143,192,0.15);
  }
  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--forest-deep);
    margin:0 0 10px;
  }
  h1{
    font-family:'Noto Sans KR', 'Noto Sans JP', -apple-system, sans-serif;
    font-weight:700;
    font-size:26px;
    margin:0 0 24px;
    color:var(--ink);
  }
  label{
    display:block;
    font-size:13px;
    color:var(--forest-deep);
    margin-bottom:6px;
  }
  .field{margin-bottom:16px;}
  input[type="text"], input[type="password"]{
    width:100%;
    border:1px solid var(--sand-line);
    border-radius:8px;
    padding:10px 12px;
    font-size:14px;
    font-family:inherit;
    background:var(--paper);
    color:var(--ink);
  }
  input[type="text"]:focus, input[type="password"]:focus{
    outline:2px solid var(--forest-deep);
    outline-offset:1px;
  }
  .submit-btn{
    width:100%;
    background:var(--forest-deep);
    color:#fff;
    border:none;
    border-radius:8px;
    padding:12px;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    font-family:inherit;
    margin-top:8px;
  }
  .submit-btn:hover{background:var(--ink);}
  .submit-btn:disabled{opacity:0.6; cursor:default;}
  .error-msg{
    color:var(--coral-deep);
    font-size:13px;
    margin:0 0 16px;
    display:none;
  }
  .error-msg.show{display:block;}
  .switch-row{
    text-align:center;
    margin-top:20px;
    font-size:13px;
    color:var(--muted);
  }
  .switch-row a{color:var(--forest-deep); font-weight:600; cursor:pointer; text-decoration:none;}
  .switch-row a:hover{text-decoration:underline;}
  #confirmField{display:none;}
</style>
</head>
<body>

  <div class="card">
    <p class="eyebrow">TRIP PLANNER</p>
    <h1 id="formTitle">로그인</h1>

    <p class="error-msg" id="errorMsg"></p>

    <form id="authForm">
      <div class="field">
        <label for="username">아이디</label>
        <input type="text" id="username" required autocomplete="username">
      </div>
      <div class="field">
        <label for="password">비밀번호</label>
        <input type="password" id="password" required autocomplete="current-password" minlength="6">
      </div>
      <div class="field" id="confirmField">
        <label for="confirmPassword">비밀번호 확인</label>
        <input type="password" id="confirmPassword" autocomplete="new-password" minlength="6">
      </div>
      <button type="submit" class="submit-btn" id="submitBtn">로그인</button>
    </form>

    <p class="switch-row" id="switchRow">
      계정이 없으신가요? <a id="switchLink">회원가입</a>
    </p>
  </div>

<script src="/auth.js"></script>
</body>
</html>
