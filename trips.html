<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trip Planner_My Trips</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9C%88%EF%B8%8F%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EAF4FB;
    --paper-raised:#FFFFFF;
    --ink:#2C4A5E;
    --forest:#CDE9F8;
    --forest-deep:#3E8FC0;
    --coral:#2EA3C7;
    --coral-deep:#1D6A85;
    --pink:#E8749A;
    --pink-deep:#B84E72;
    --sand:#DCF0FB;
    --sand-line:#BEE3F5;
    --muted:#6C90A3;
  }
  *{box-sizing:border-box;}
  html, body{overflow-x:hidden; max-width:100%;}
  body{
    margin:0;
    background-color:var(--paper);
    background-image:url("data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20width%3D%27900%27%20height%3D%27620%27%3E%3Cdefs%3E%3CradialGradient%20id%3D%27g%27%20cx%3D%2735%25%27%20cy%3D%2730%25%27%20r%3D%2775%25%27%3E%3Cstop%20offset%3D%270%25%27%20stop-color%3D%27%23FFFFFF%27%20stop-opacity%3D%270.95%27/%3E%3Cstop%20offset%3D%27100%25%27%20stop-color%3D%27%23BFE0EF%27%20stop-opacity%3D%270.4%27/%3E%3C/radialGradient%3E%3Cfilter%20id%3D%27b%27%20x%3D%27-60%25%27%20y%3D%27-60%25%27%20width%3D%27220%25%27%20height%3D%27220%25%27%3E%3CfeGaussianBlur%20stdDeviation%3D%276%27/%3E%3C/filter%3E%3C/defs%3E%3Cg%20fill%3D%27%239DC3DE%27%20opacity%3D%270.4%27%20filter%3D%27url(%23b)%27%3E%3Cellipse%20cx%3D%2798%27%20cy%3D%27110%27%20rx%3D%2748%27%20ry%3D%2724%27/%3E%3Cellipse%20cx%3D%27143%27%20cy%3D%2796%27%20rx%3D%2736%27%20ry%3D%2720%27/%3E%3Cellipse%20cx%3D%2758%27%20cy%3D%27100%27%20rx%3D%2726%27%20ry%3D%2715%27/%3E%3Cellipse%20cx%3D%27796%27%20cy%3D%2763%27%20rx%3D%2730%27%20ry%3D%2715%27/%3E%3Cellipse%20cx%3D%27822%27%20cy%3D%2756%27%20rx%3D%2720%27%20ry%3D%2711%27/%3E%3Cellipse%20cx%3D%27196%27%20cy%3D%27438%27%20rx%3D%2760%27%20ry%3D%2730%27/%3E%3Cellipse%20cx%3D%27256%27%20cy%3D%27420%27%20rx%3D%2742%27%20ry%3D%2724%27/%3E%3Cellipse%20cx%3D%27146%27%20cy%3D%27428%27%20rx%3D%2730%27%20ry%3D%2717%27/%3E%3Cellipse%20cx%3D%27706%27%20cy%3D%27508%27%20rx%3D%2744%27%20ry%3D%2722%27/%3E%3Cellipse%20cx%3D%27746%27%20cy%3D%27494%27%20rx%3D%2730%27%20ry%3D%2716%27/%3E%3Cellipse%20cx%3D%27476%27%20cy%3D%27168%27%20rx%3D%2726%27%20ry%3D%2713%27/%3E%3Cellipse%20cx%3D%27501%27%20cy%3D%27160%27%20rx%3D%2716%27%20ry%3D%279%27/%3E%3Cellipse%20cx%3D%2751%27%20cy%3D%27588%27%20rx%3D%2720%27%20ry%3D%2710%27/%3E%3C/g%3E%3Cg%20fill%3D%27url(%23g)%27%3E%3Cellipse%20cx%3D%2790%27%20cy%3D%27100%27%20rx%3D%2748%27%20ry%3D%2724%27/%3E%3Cellipse%20cx%3D%27135%27%20cy%3D%2786%27%20rx%3D%2736%27%20ry%3D%2720%27/%3E%3Cellipse%20cx%3D%2755%27%20cy%3D%2792%27%20rx%3D%2726%27%20ry%3D%2715%27/%3E%3Crect%20x%3D%2740%27%20y%3D%2792%27%20width%3D%27120%27%20height%3D%2730%27%20rx%3D%2715%27/%3E%3Cellipse%20cx%3D%27790%27%20cy%3D%2755%27%20rx%3D%2730%27%20ry%3D%2715%27/%3E%3Cellipse%20cx%3D%27815%27%20cy%3D%2748%27%20rx%3D%2720%27%20ry%3D%2711%27/%3E%3Crect%20x%3D%27772%27%20y%3D%2748%27%20width%3D%2766%27%20height%3D%2718%27%20rx%3D%279%27/%3E%3Cellipse%20cx%3D%27190%27%20cy%3D%27430%27%20rx%3D%2760%27%20ry%3D%2730%27/%3E%3Cellipse%20cx%3D%27250%27%20cy%3D%27412%27%20rx%3D%2742%27%20ry%3D%2724%27/%3E%3Cellipse%20cx%3D%27140%27%20cy%3D%27420%27%20rx%3D%2730%27%20ry%3D%2717%27/%3E%3Crect%20x%3D%27120%27%20y%3D%27416%27%20width%3D%27170%27%20height%3D%2734%27%20rx%3D%2717%27/%3E%3Cellipse%20cx%3D%27700%27%20cy%3D%27500%27%20rx%3D%2744%27%20ry%3D%2722%27/%3E%3Cellipse%20cx%3D%27740%27%20cy%3D%27486%27%20rx%3D%2730%27%20ry%3D%2716%27/%3E%3Crect%20x%3D%27662%27%20y%3D%27486%27%20width%3D%27120%27%20height%3D%2726%27%20rx%3D%2713%27/%3E%3Cellipse%20cx%3D%27470%27%20cy%3D%27160%27%20rx%3D%2726%27%20ry%3D%2713%27/%3E%3Cellipse%20cx%3D%27495%27%20cy%3D%27152%27%20rx%3D%2716%27%20ry%3D%279%27/%3E%3Crect%20x%3D%27452%27%20y%3D%27150%27%20width%3D%2772%27%20height%3D%2716%27%20rx%3D%278%27/%3E%3Cellipse%20cx%3D%2745%27%20cy%3D%27580%27%20rx%3D%2720%27%20ry%3D%2710%27/%3E%3Crect%20x%3D%2730%27%20y%3D%27574%27%20width%3D%2740%27%20height%3D%2712%27%20rx%3D%276%27/%3E%3C/g%3E%3C/svg%3E");
    background-repeat:repeat;
    background-size:900px 620px;
    color:var(--ink);
    font-family:'Noto Sans KR', -apple-system, sans-serif;
    padding:20px 24px 100px;
  }
  .wrap{max-width:1800px;margin:0 auto;}

  .header{
    background:var(--forest);
    color:var(--ink);
    border-radius:20px;
    padding:26px 40px 22px;
    position:relative;
    overflow:hidden;
    margin-bottom:20px;
    min-height:190px;
    box-sizing:border-box;
  }
  .header-clouds{
    position:absolute;
    inset:0;
    z-index:0;
    pointer-events:none;
  }
  .header .eyebrow, .header h1, .header p{
    position:relative;
    z-index:1;
  }
  @media (max-width:480px){
    .header{padding:22px 20px 18px;}
  }
  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--forest-deep);
    margin:0 0 10px;
  }
  .header h1{
    font-family:'Noto Sans KR', -apple-system, sans-serif;
    font-weight:700;
    font-size:clamp(22px, 6vw, 38px);
    margin:0;
    color:var(--ink);
  }
  .header p{
    margin:8px 0 0;
    font-size:13px;
    color:var(--forest-deep);
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(240px, 1fr));
    gap:16px;
  }

  .trip-card{
    background:var(--paper-raised);
    border:1px solid var(--sand-line);
    border-radius:16px;
    overflow:hidden;
    cursor:pointer;
    transition:transform 0.15s ease, box-shadow 0.15s ease;
    position:relative;
    text-align:left;
    font-family:inherit;
  }
  .trip-card:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 24px rgba(62,143,192,0.18);
  }
  .trip-card .band{
    background:var(--sand);
    padding:16px 18px 14px;
  }
  .trip-card .band .label{
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    letter-spacing:0.08em;
    color:var(--forest-deep);
    margin-bottom:6px;
  }
  .trip-card .band h3{
    margin:0;
    font-size:18px;
    font-weight:700;
    color:var(--ink);
    overflow-wrap:break-word;
  }
  .trip-card .body{
    padding:14px 18px 16px;
  }
  .trip-card .dates{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:var(--muted);
    margin-bottom:10px;
  }
  .trip-card .desc{
    font-size:12.5px;
    line-height:1.5;
    color:var(--ink);
    overflow-wrap:break-word;
  }
  .trip-card .desc.empty{
    color:var(--muted);
    font-style:italic;
  }
  .trip-card .edit-desc{
    position:absolute;
    bottom:12px; right:12px;
    background:rgba(255,255,255,0.75);
    border:none;
    border-radius:6px;
    width:24px; height:24px;
    display:flex; align-items:center; justify-content:center;
    color:var(--muted);
    cursor:pointer;
    font-size:12px;
    opacity:0;
    transition:opacity 0.15s ease;
    z-index:2;
  }
  .trip-card:hover .edit-desc{opacity:1;}
  .trip-card .edit-desc:hover{color:var(--forest-deep);}
  .trip-card .del{
    position:absolute;
    top:12px; right:12px;
    background:rgba(255,255,255,0.75);
    border:none;
    border-radius:6px;
    width:24px; height:24px;
    display:flex; align-items:center; justify-content:center;
    color:var(--muted);
    cursor:pointer;
    font-size:14px;
    opacity:0;
    transition:opacity 0.15s ease;
    z-index:2;
  }
  .trip-card:hover .del{opacity:1;}
  .trip-card .del:hover{color:var(--coral-deep);}

  .new-trip-card{
    border:2px dashed var(--sand-line);
    border-radius:16px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:8px;
    min-height:150px;
    color:var(--forest-deep);
    cursor:pointer;
    background:transparent;
    font-family:inherit;
  }
  .new-trip-card:hover{background:var(--sand);}
  .new-trip-card .plus{
    font-size:26px;
    width:44px; height:44px;
    border-radius:50%;
    background:var(--forest-deep);
    color:#fff;
    display:flex; align-items:center; justify-content:center;
  }
  .new-trip-card span.label-text{font-size:13px; font-weight:500;}

  .empty-note{
    text-align:center;
    color:var(--muted);
    font-size:13px;
    padding:40px 0;
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <svg class="header-clouds" viewBox="0 0 800 200" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="hc" cx="35%" cy="30%" r="75%">
          <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
          <stop offset="100%" stop-color="#8FCBEA" stop-opacity="0.45"/>
        </radialGradient>
        <filter id="hblur" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur stdDeviation="6"/>
        </filter>
      </defs>
      <g filter="url(#hblur)" fill="#5FA3C9" opacity="0.28">
        <circle cx="650" cy="44" r="55"/>
        <circle cx="708" cy="30" r="70"/>
        <circle cx="760" cy="49" r="50"/>
      </g>
      <g filter="url(#hblur)" fill="url(#hc)">
        <circle cx="640" cy="35" r="55"/>
        <circle cx="700" cy="22" r="70"/>
        <circle cx="755" cy="42" r="50"/>
        <rect x="615" y="35" width="180" height="55" rx="27"/>
      </g>
      <g filter="url(#hblur)" fill="#5FA3C9" opacity="0.22">
        <circle cx="68" cy="172" r="45"/>
        <circle cx="116" cy="160" r="55"/>
        <circle cx="166" cy="175" r="38"/>
      </g>
      <g filter="url(#hblur)" fill="url(#hc)" opacity="0.7">
        <circle cx="60" cy="165" r="45"/>
        <circle cx="110" cy="152" r="55"/>
        <circle cx="160" cy="168" r="38"/>
        <rect x="42" y="160" width="140" height="42" rx="21"/>
      </g>
      <g filter="url(#hblur)" fill="url(#hc)" opacity="0.45">
        <circle cx="330" cy="18" r="22"/>
        <circle cx="358" cy="12" r="16"/>
        <rect x="316" y="14" width="60" height="16" rx="8"/>
      </g>
    </svg>
    <p class="eyebrow">TRIP PLANNER</p>
    <h1>내 여행들</h1>
    <p>여행을 골라서 계속 이어가거나, 새 여행을 시작해보세요.</p>
  </div>

  <div class="grid" id="tripGrid"></div>

</div>

<script src="trips.js"></script>
</body>
</html>
