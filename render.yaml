databases:
  - name: trip-planner-db
    plan: free

services:
  - type: web
    name: trip-planner
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: trip-planner-db
          property: connectionString
