databases:
  - name: trip-planner-db
    plan: free

services:
  - type: web
    name: trip-planner
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trip-planner-db
          property: connectionString
